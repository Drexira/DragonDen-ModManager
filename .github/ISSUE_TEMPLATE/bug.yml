name: Bug
description: Something doesn't work the way it should
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Short and clear
      placeholder: Example. Clicking Update installs the wrong version.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps
      placeholder: "1. Open app\n2. Click Update\n3. See wrong version"
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: input
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: dropdown
    id: frequency
    attributes:
      label: Frequency
      options: ["Always", "Often", "Rare"]
    validations:
      required: true
  - type: input
    id: mod-manager-version
    attributes:
      label: Mod Manager version
      placeholder: 1.2.3
    validations:
      required: true
  - type: input
    id: spt-version
    attributes:
      label: SPT version
      placeholder: 4.x.x
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options: ["Windows 11", "Windows 10", "Linux Proton", "Other"]
    validations:
      required: true
  - type: input
    id: spt-path
    attributes:
      label: SPT install path
      placeholder: C:\Games\SPT
  - type: checkboxes
    id: artifacts
    attributes:
      label: Attachments
      options:
        - label: I attached logs
        - label: I attached a screenshot or clip
