name: Docs or Help Fix
description: Docs are missing or unclear
labels: ["docs"]
body:
  - type: input
    id: page
    attributes:
      label: Page link
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested text
  - type: checkboxes
    id: extras
    attributes:
      label: Extras
      options:
        - label: Needs a screenshot
        - label: Needs an example